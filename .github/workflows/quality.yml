name: Lotion quality gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    name: Test, package, and cold-start Lotion
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release gate
        run: npm run release:gate

      - name: Upload release and UI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lotion-quality-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            artifacts/test-releases/
            artifacts/ui-smoke/
