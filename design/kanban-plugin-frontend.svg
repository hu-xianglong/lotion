<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="920" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">Lotion Kanban Plugin View Frontend Design</title>
  <desc id="desc">Frontend design for rendering a Kanban database view through the plugin view provider host.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1f1d1a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #faf6ee; }
      .paper { fill: #fffdf8; }
      .panel { fill: #f6f1e7; }
      .line { stroke: #ddd2ba; stroke-width: 1; }
      .soft-line { stroke: #ece4d2; stroke-width: 1; }
      .ink { fill: #1f1d1a; }
      .muted { fill: #7a7268; }
      .faint { fill: #a39988; }
      .mono { font-family: "SF Mono", "JetBrains Mono", ui-monospace, monospace; }
      .ui { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; }
      .title { font-size: 28px; font-weight: 700; }
      .h2 { font-size: 15px; font-weight: 700; }
      .body { font-size: 13px; }
      .small { font-size: 11px; }
      .tiny { font-size: 10px; }
      .tab-active { stroke: #1f1d1a; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1440" height="920" rx="24" class="bg"/>

  <g filter="url(#shadow)">
    <rect x="48" y="42" width="1344" height="820" rx="14" class="paper"/>
  </g>

  <!-- Sidebar -->
  <rect x="48" y="42" width="252" height="820" rx="14" class="panel"/>
  <line x1="300" y1="42" x2="300" y2="862" class="line"/>
  <text x="76" y="86" class="ui h2 ink">Lotion Demo Space</text>
  <rect x="76" y="110" width="192" height="34" rx="6" fill="#fffdf8" stroke="#ddd2ba"/>
  <text x="92" y="132" class="ui body muted">Search pages and databases</text>
  <text x="76" y="182" class="ui small faint" font-weight="700">PAGES</text>
  <text x="92" y="224" class="ui body muted">Home</text>
  <text x="92" y="260" class="ui body muted">Weekly Review</text>
  <text x="92" y="296" class="ui body muted">Markdown Lab</text>
  <text x="76" y="356" class="ui small faint" font-weight="700">DATABASES</text>
  <rect x="76" y="378" width="192" height="34" rx="6" fill="#ebe3d1"/>
  <text x="92" y="400" class="ui body ink">Tasks</text>
  <text x="92" y="438" class="ui body muted">Reading List</text>
  <text x="92" y="474" class="ui body muted">Field Type Lab</text>

  <!-- Main shell -->
  <text x="348" y="104" class="ui title ink">Tasks</text>
  <text x="348" y="130" class="ui body muted">8 fields · 4 rows · CSV backed</text>

  <!-- View tabs and toolbar -->
  <line x1="300" y1="170" x2="1392" y2="170" class="soft-line"/>
  <g transform="translate(348 146)">
    <text x="0" y="0" class="ui body muted">▦ Default</text>
    <text x="112" y="0" class="ui body ink" font-weight="600">▥ Board</text>
    <line x1="112" y1="20" x2="174" y2="20" class="tab-active"/>
    <text x="206" y="0" class="ui body muted">＋</text>
  </g>
  <g transform="translate(1114 128)">
    <rect x="0" y="0" width="34" height="30" rx="6" fill="#fffdf8" stroke="#ece4d2"/>
    <text x="10" y="20" class="ui small muted">F</text>
    <rect x="42" y="0" width="34" height="30" rx="6" fill="#fffdf8" stroke="#ece4d2"/>
    <text x="52" y="20" class="ui small muted">S</text>
    <rect x="84" y="0" width="34" height="30" rx="6" fill="#fffdf8" stroke="#ece4d2"/>
    <text x="94" y="20" class="ui small muted">Q</text>
    <rect x="128" y="0" width="88" height="30" rx="6" fill="#1f1d1a"/>
    <text x="148" y="20" class="ui small" fill="#fffdf8">Add row</text>
  </g>

  <!-- Plugin host ribbon -->
  <rect x="348" y="194" width="996" height="48" rx="8" fill="#f6f1e7" stroke="#ece4d2"/>
  <text x="370" y="214" class="ui small faint" font-weight="700">PLUGIN VIEW HOST</text>
  <text x="370" y="232" class="ui body ink">type=kanban renders through DatabaseViewProvider.render()</text>
  <text x="1044" y="224" class="mono small muted">config.groupBy = status</text>

  <!-- Board -->
  <rect x="348" y="272" width="996" height="520" rx="10" fill="#fffdf8" stroke="#ece4d2"/>
  <text x="372" y="306" class="ui small faint" font-weight="700">GROUP BY</text>
  <rect x="454" y="288" width="86" height="28" rx="14" fill="#eef4fb" stroke="#aac1dc"/>
  <text x="474" y="307" class="ui small" fill="#315c7e">Status</text>

  <!-- Columns -->
  <g transform="translate(372 338)">
    <g>
      <text x="0" y="0" class="ui small ink" font-weight="700">TODO</text>
      <circle cx="54" cy="-4" r="5" fill="#a39988"/>
      <text x="68" y="0" class="mono small faint">2</text>
      <line x1="0" y1="18" x2="250" y2="18" class="soft-line"/>
      <rect x="0" y="38" width="250" height="88" rx="7" fill="#fffdf8" stroke="#ddd2ba"/>
      <text x="14" y="62" class="ui body ink" font-weight="600">Add a formula field</text>
      <text x="14" y="84" class="mono small muted">Priority · Medium</text>
      <rect x="14" y="98" width="58" height="18" rx="9" fill="#fbf4df" stroke="#d6c48d"/>
      <text x="27" y="111" class="ui tiny" fill="#725d24">Formula</text>
      <rect x="0" y="138" width="250" height="78" rx="7" fill="#fffdf8" stroke="#ddd2ba"/>
      <text x="14" y="162" class="ui body ink" font-weight="600">Try manual Git backup</text>
      <text x="14" y="184" class="mono small muted">Priority · Low</text>
      <text x="14" y="244" class="ui body faint">+ New</text>
    </g>

    <g transform="translate(302 0)">
      <text x="0" y="0" class="ui small ink" font-weight="700">IN PROGRESS</text>
      <circle cx="92" cy="-4" r="5" fill="#5a86b6"/>
      <text x="106" y="0" class="mono small faint">1</text>
      <line x1="0" y1="18" x2="250" y2="18" class="soft-line"/>
      <rect x="0" y="38" width="250" height="96" rx="7" fill="#fffdf8" stroke="#ddd2ba"/>
      <text x="14" y="62" class="ui body ink" font-weight="600">Test embedded table editing</text>
      <text x="14" y="84" class="mono small muted">Due · 2026-05-18</text>
      <rect x="14" y="100" width="28" height="18" rx="9" fill="#eef4fb" stroke="#aac1dc"/>
      <text x="25" y="113" class="ui tiny" fill="#315c7e">UI</text>
      <rect x="-8" y="150" width="266" height="52" rx="8" fill="none" stroke="#c25434" stroke-width="2" stroke-dasharray="6 5"/>
      <text x="14" y="244" class="ui body faint">+ New</text>
    </g>

    <g transform="translate(604 0)">
      <text x="0" y="0" class="ui small ink" font-weight="700">DONE</text>
      <circle cx="46" cy="-4" r="5" fill="#5f9367"/>
      <text x="60" y="0" class="mono small faint">1</text>
      <line x1="0" y1="18" x2="250" y2="18" class="soft-line"/>
      <rect x="0" y="38" width="250" height="96" rx="7" fill="#fffdf8" stroke="#ddd2ba"/>
      <text x="14" y="62" class="ui body ink" font-weight="600">Design sample workspace</text>
      <text x="14" y="84" class="mono small muted">Score · 0</text>
      <rect x="14" y="100" width="58" height="18" rx="9" fill="#eaf4eb" stroke="#b8d4bd"/>
      <text x="28" y="113" class="ui tiny" fill="#3e6845">Done</text>
      <text x="14" y="244" class="ui body faint">+ New</text>
    </g>
  </g>

  <!-- Notes -->
  <g transform="translate(348 820)">
    <circle cx="8" cy="-4" r="4" fill="#c25434"/>
    <text x="22" y="0" class="ui small muted">Drag card to another column updates the select cell through workspace.updateCell.</text>
    <circle cx="498" cy="-4" r="4" fill="#5a86b6"/>
    <text x="512" y="0" class="ui small muted">View settings renders provider config fields, starting with groupBy.</text>
  </g>
</svg>
